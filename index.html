<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Compare Lizard</title>
    <link rel="icon" type="image/png" href="assets/apple-icon.png?v=20260609-2341">
    <link rel="apple-touch-icon" href="assets/apple-icon.png?v=20260609-2341">
    <link rel="stylesheet" href="styles.css?v=20260609-2341">
  </head>
  <body>
    <main class="app-shell">
      <header class="top-bar">
        <div class="brand-lockup">
          <img src="assets/yelling-lizard-logo.png?v=20260609-2341" alt="" class="brand-logo" width="72" height="72">
          <div>
            <p class="eyebrow">JSON diff checker</p>
            <h1>Compare Lizard</h1>
          </div>
        </div>
        <div class="action-bar" aria-label="Comparison actions">
          <details class="tools-menu">
            <summary>Tools</summary>
            <div class="tools-menu-list">
              <a href="https://davidbreyer.github.io/format-lizard/">Format Lizard</a>
              <a href="https://davidbreyer.github.io/compare-lizard/" aria-current="page">Compare Lizard</a>
            </div>
          </details>
          <button id="openLeftButton" type="button">Open Left</button>
          <button id="openRightButton" type="button">Open Right</button>
          <button id="compareButton" type="button" class="primary-button">Compare</button>
          <button id="copyButton" type="button">Copy</button>
          <button id="saveButton" type="button">Save</button>
          <button id="clearButton" type="button" class="ghost-button">Clear</button>
          <input id="leftFileInput" class="file-input" type="file" accept=".json,.txt,application/json,text/plain">
          <input id="rightFileInput" class="file-input" type="file" accept=".json,.txt,application/json,text/plain">
        </div>
      </header>

      <section class="control-panel" aria-label="Comparison controls">
        <div class="control-group">
          <span class="control-group-title">Compare</span>
          <div class="control-row">
            <label class="field-label" for="compareMode">Mode</label>
            <select id="compareMode">
              <option value="structural">Structural paths</option>
              <option value="values">Values only</option>
            </select>

            <label class="field-label" for="filterSelect">Show</label>
            <select id="filterSelect">
              <option value="all">All differences</option>
              <option value="added">Added</option>
              <option value="removed">Removed</option>
              <option value="changed">Changed</option>
              <option value="equal">Equal</option>
            </select>
          </div>
        </div>

        <div class="control-group">
          <span class="control-group-title">Options</span>
          <div class="control-row">
            <label class="checkbox-control" for="strictValues">
              <input id="strictValues" type="checkbox" checked>
              <span>Strict values</span>
            </label>
            <label class="checkbox-control" for="ignoreKeyOrder">
              <input id="ignoreKeyOrder" type="checkbox" checked>
              <span>Ignore object key order</span>
            </label>
            <label class="checkbox-control" for="includeEqual">
              <input id="includeEqual" type="checkbox">
              <span>Include equal paths</span>
            </label>
          </div>
        </div>
      </section>

      <section class="status-row" aria-live="polite">
        <div id="status" class="status-pill status-idle">Ready</div>
        <div id="stats" class="stats">0 added · 0 removed · 0 changed</div>
      </section>

      <section class="summary-strip" aria-label="Diff summary">
        <button class="summary-card added-card" type="button" data-filter="added">
          <span id="addedCount">0</span>
          <strong>Added</strong>
        </button>
        <button class="summary-card removed-card" type="button" data-filter="removed">
          <span id="removedCount">0</span>
          <strong>Removed</strong>
        </button>
        <button class="summary-card changed-card" type="button" data-filter="changed">
          <span id="changedCount">0</span>
          <strong>Changed</strong>
        </button>
        <button class="summary-card equal-card" type="button" data-filter="equal">
          <span id="equalCount">0</span>
          <strong>Equal</strong>
        </button>
      </section>

      <section class="editor-grid" aria-label="JSON editors">
        <div class="editor-pane">
          <div class="pane-header">
            <label for="leftInput">Left JSON</label>
            <span id="leftCount">0 chars</span>
          </div>
          <textarea id="leftInput" spellcheck="false" aria-label="Left JSON input"></textarea>
        </div>

        <div class="editor-pane">
          <div class="pane-header">
            <label for="rightInput">Right JSON</label>
            <span id="rightCount">0 chars</span>
          </div>
          <textarea id="rightInput" spellcheck="false" aria-label="Right JSON input"></textarea>
        </div>
      </section>

      <section class="diff-panel" aria-label="Comparison results">
        <div class="pane-header">
          <label for="diffRows">Diff Results</label>
          <span id="resultCount">0 rows</span>
        </div>
        <div class="diff-table" role="table" aria-describedby="resultCount">
          <div class="diff-head" role="row">
            <span role="columnheader">Path</span>
            <span role="columnheader">Type</span>
            <span role="columnheader">Left</span>
            <span role="columnheader">Right</span>
          </div>
          <div id="diffRows" class="diff-rows" role="rowgroup"></div>
        </div>
      </section>

      <footer class="app-footer">
        <span>Ready to spot the sneaky bits.</span>
        <span>
          <a href="https://github.com/davidbreyer/compare-lizard" target="_blank" rel="noreferrer">GitHub</a>
          <span id="releaseStamp" data-version>Version: 20260609-2341</span>
        </span>
      </footer>
    </main>

    <script src="script.js?v=20260609-2341"></script>
  </body>
</html>
